<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Meu App</title>
  <meta name="theme-color" content="#0f172a"/>
  
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <style>
    body{margin:0; font-family:Arial, sans-serif; background:#020f2b; color:white; padding:20px;}
    h1{text-align:center; margin-bottom:30px;}
    .card{background:#1e293b; border-radius:20px; padding:20px; margin-bottom:25px;}
    input{width:100%; padding:15px; margin-top:15px; border:none; border-radius:15px; background:#374151; color:white; font-size:16px; box-sizing:border-box;}
    button{width:100%; padding:15px; margin-top:20px; border:none; border-radius:15px; background:#2563eb; color:white; font-size:18px; font-weight:bold; cursor:pointer;}
    .item{background:#334155; padding:15px; border-radius:15px; margin-top:10px; display:flex; justify-content:space-between; align-items:center;}
    .delete-btn{background:#ef4444; padding:5px 10px; border-radius:8px; cursor:pointer; font-size:12px;}
  </style>
</head>
<body>

  <h1>Meu App</h1>

  <div class="card">
    <h2>Adicionar Item</h2>
    <input type="text" id="nome" placeholder="Nome">
    <input type="number" id="valor" placeholder="Valor">
    <button onclick="salvarItem()">Salvar</button>
  </div>

  <div class="card">
    <h2>Itens Salvos</h2>
    <div id="lista">Carregando...</div>
  </div>

  <script>
    // ── CONFIGURAÇÃO FIREBASE ─────────────────────────────────────────────────
    const firebaseConfig = {
      apiKey: "AIzaSyCksV5Rh_bqxc8CDGY_gKmOQ3EGrnmF-us",
      authDomain: "fin-dash-fc0a8.firebaseapp.com",
      projectId: "fin-dash-fc0a8",
      storageBucket: "fin-dash-fc0a8.firebasestorage.app",
      messagingSenderId: "486217263252",
      appId: "1:486217263252:web:fa91df24c5375c6617ac81"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let itens = [];

    // ── SINCRONIZAÇÃO EM TEMPO REAL ──────────────────────────────────────────
    db.collection("meu_app").doc("dados").onSnapshot((doc) => {
      if (doc.exists) {
        itens = doc.data().lista || [];
        renderizar();
      } else {
        renderizar();
      }
    });

    function renderizar() {
      const lista = document.getElementById("lista");
      lista.innerHTML = "";

      if(itens.length === 0){
        lista.innerHTML = "<p>Nenhum item salvo.</p>";
        return;
      }

      itens.forEach((item, index) => {
        lista.innerHTML += `
          <div class="item">
            <div><strong>${item.nome}</strong><br>R$ ${item.valor}</div>
            <div class="delete-btn" onclick="deletarItem(${index})">Excluir</div>
          </div>
        `;
      });
    }

    async function salvarItem(){
      const nome = document.getElementById("nome").value;
      const valor = document.getElementById("valor").value;

      if(!nome || !valor){
        alert("Preencha todos os campos");
        return;
      }

      itens.push({ nome, valor });

      // Salva no Firestore
      await db.collection("meu_app").doc("dados").set({ lista: itens });

      document.getElementById("nome").value = "";
      document.getElementById("valor").value = "";
    }

    async function deletarItem(index) {
      itens.splice(index, 1);
      await db.collection("meu_app").doc("dados").set({ lista: itens });
    }

  </script>
</body>
</html>
