<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>FinDash</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{--bg:#0B0B18;--surf:#16162A;--surf2:#1E1E38;--surf3:#252548;--p:#7C3AED;--p2:#4F46E5;--green:#10B981;--amber:#F59E0B;--red:#EF4444;--txt:#F1F5F9;--txt2:#CBD5E1;--muted:#64748B;--border:rgba(255,255,255,0.07);--r:16px;--r2:10px}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;max-width:430px;margin:0 auto;display:flex;flex-direction:column}
#sidebar{position:fixed;top:0;left:-100%;width:85%;max-width:320px;height:100%;background:var(--surf);z-index:1000;transition:.4s cubic-bezier(.4,0,.2,1);box-shadow:10px 0 30px rgba(0,0,0,.5);padding:40px 20px;display:flex;flex-direction:column}
#sidebar.active{left:0}
#scrim{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:950;display:none;backdrop-filter:blur(3px)}
#scrim.active{display:block}
.profile-section{text-align:center;margin-bottom:30px}
.profile-img-container{width:90px;height:90px;border-radius:50%;border:3px solid var(--p);margin:0 auto 15px;position:relative;overflow:hidden;background:var(--surf2);display:flex;align-items:center;justify-content:center}
.profile-img-container img{width:100%;height:100%;object-fit:cover}
.profile-img-container i{font-size:40px;color:var(--muted)}
.edit-photo-btn{position:absolute;bottom:0;right:0;background:var(--p);width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;color:#fff}
.menu-trigger{cursor:pointer;color:var(--txt);margin-right:12px;font-size:20px}
#hdr{background:linear-gradient(180deg,rgba(124,58,237,.18) 0%,transparent 100%);padding:48px 18px 12px;flex-shrink:0}
.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.greeting{font-size:21px;font-weight:700;display:flex;align-items:center}
.greeting span{color:#A78BFA}
.month-tag{background:var(--surf2);border:1px solid var(--border);border-radius:20px;padding:5px 13px;font-size:12px;color:var(--txt2);display:flex;align-items:center;gap:8px;user-select:none}
.m-arr{cursor:pointer;padding:0 5px;font-weight:800;transition:color .2s}
.m-arr:hover{color:#A78BFA}
#chips,.x-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
#chips::-webkit-scrollbar,.x-scroll::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surf2);color:var(--txt2);font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px}
.chip.on{background:linear-gradient(135deg,var(--p),var(--p2));border-color:transparent;color:#fff}
.cdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
#screens{flex:1;overflow:hidden;position:relative}
.scr{position:absolute;inset:0;overflow-y:auto;padding:14px 18px 88px;display:none;scrollbar-width:none}
.scr::-webkit-scrollbar{display:none}
.scr.on{display:block}
.card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:15px;margin-bottom:11px}
.card-click{cursor:pointer;transition:transform .15s}
.card-click:active{transform:scale(.98)}
.sec{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:10px 0 8px}
.sec-row{display:flex;justify-content:space-between;align-items:center;margin:10px 0 8px}
.sec-row .sec{margin:0}
.cfg-btn{background:var(--surf2);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:11px;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .2s}
.cfg-btn:hover{color:var(--txt2);border-color:var(--p)}
/* BIG STAT */
.big-stat{background:linear-gradient(135deg,rgba(124,58,237,.18),rgba(59,130,246,.18));border:1px solid rgba(124,58,237,.3);border-radius:var(--r);padding:22px;text-align:center;margin-bottom:12px}
.bs-lbl{font-size:11px;color:#A78BFA;text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;justify-content:center;gap:8px}
.bs-cfg{background:rgba(124,58,237,.25);border:1px solid rgba(124,58,237,.4);border-radius:20px;padding:3px 10px;font-size:10px;color:#A78BFA;cursor:pointer;display:flex;align-items:center;gap:4px}
.bs-val{font-size:34px;font-weight:800;background:linear-gradient(135deg,#A78BFA,#60A5FA);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-1px;min-height:44px}
.bs-sub{font-size:12px;color:var(--muted);margin-top:5px}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:11px}
.sc{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.sc-tap{cursor:pointer;transition:all .2s}
.sc-tap:active{transform:scale(.97)}
.sc-tap:hover{border-color:rgba(124,58,237,.4)}
.sl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px;font-weight:600}
.sv{font-size:18px;font-weight:700;letter-spacing:-.4px;min-height:26px}
.ss{font-size:11px;color:var(--muted);margin-top:3px}
.sc-link{font-size:10px;color:#A78BFA;font-weight:600;margin-top:7px;display:block}
.pb{background:var(--surf2);border-radius:4px;height:5px;overflow:hidden;margin-top:7px}
.pf{height:100%;border-radius:4px;transition:width .8s ease}
/* TRANSACTION ITEM */
.ti{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--border)}
.ti:last-child{border-bottom:none}
.tico{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.tin{flex:1;min-width:0}
.tid{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tim{font-size:11px;color:var(--muted);margin-top:2px}
.ti-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.tia{font-size:14px;font-weight:700;color:var(--red)}
.ti-edit{font-size:10px;color:var(--muted);cursor:pointer;padding:2px 7px;background:var(--surf2);border-radius:6px;border:1px solid var(--border);transition:all .15s;white-space:nowrap}
.ti-edit:hover{color:#A78BFA;border-color:var(--p)}
.pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600}
.pc{background:rgba(124,58,237,.2);color:#A78BFA}.pn{background:rgba(59,130,246,.2);color:#60A5FA}
.subcat-pill{display:inline-block;background:rgba(124,58,237,.2);color:#A78BFA;border-radius:20px;padding:2px 7px;font-size:10px;font-weight:600;margin-left:3px}
/* CREDIT CARD */
.ccv{border-radius:18px;padding:20px;margin-bottom:14px;position:relative;overflow:hidden;min-height:165px;display:flex;flex-direction:column;justify-content:space-between;cursor:pointer;transition:transform .15s}
.ccv:active{transform:scale(.98)}
.ccv::before{content:'';position:absolute;top:-35px;right:-35px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.07)}
.ccv::after{content:'';position:absolute;bottom:-50px;right:30px;width:110px;height:110px;border-radius:50%;background:rgba(255,255,255,.04)}
.cc-top{display:flex;justify-content:space-between;align-items:flex-start}
.cc-name{font-size:17px;font-weight:700}.cc-net{font-size:11px;opacity:.6;margin-top:2px}
.cc-row{display:flex;gap:20px;position:relative;z-index:1}
.cc-lbl{font-size:9px;opacity:.65;text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}.cc-val{font-size:15px;font-weight:700}
.cc-edit-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:8px;padding:4px 9px;font-size:11px;cursor:pointer;color:#fff;font-weight:600;backdrop-filter:blur(4px);transition:background .2s;white-space:nowrap;flex-shrink:0}
.cc-edit-btn:hover{background:rgba(255,255,255,.28)}
.usage-card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:9px;cursor:pointer;transition:all .2s}
.usage-card:hover{border-color:rgba(124,58,237,.4)}
.usage-card:active{transform:scale(.98)}
/* NAV */
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(22,22,42,.95);border-top:1px solid var(--border);display:flex;padding:8px 0 22px;z-index:100;backdrop-filter:blur(20px)}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px;cursor:pointer}
.ni svg{width:22px;height:22px;color:var(--muted);transition:color .2s}
.ni span{font-size:9px;color:var(--muted);font-weight:600;transition:color .2s}
.ni.on svg,.ni.on span{color:#A78BFA}
#fab{position:fixed;bottom:78px;right:calc(50% - 210px);width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,var(--p),var(--p2));display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 18px rgba(124,58,237,.45);z-index:99;transition:transform .15s}
#fab:active{transform:scale(.93)}
/* MODALS */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:1500;display:none;align-items:flex-end;backdrop-filter:blur(4px)}
.mo.on{display:flex}
.mo-hi{z-index:2000}
.mb{background:var(--surf);border-radius:22px 22px 0 0;padding:22px;width:100%;max-width:430px;margin:0 auto;border-top:1px solid var(--border);max-height:88vh;overflow-y:auto}
.mh{width:38px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px}
.mt{font-size:17px;font-weight:700;text-align:center;margin-bottom:18px}
.fg{margin-bottom:14px}
.fl{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px;display:block}
.fi{width:100%;background:var(--surf2);border:1px solid var(--border);border-radius:var(--r2);padding:11px 14px;color:var(--txt);font-size:14px;outline:none;transition:border-color .2s}
.fi:focus{border-color:var(--p)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--p),var(--p2));border:none;border-radius:var(--r2);color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin-top:6px}
.btn-out-red{width:100%;padding:11px;background:transparent;border:1px solid var(--red);border-radius:var(--r2);color:var(--red);font-size:13px;font-weight:600;cursor:pointer;margin-top:8px}
.cg{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.co{background:var(--surf2);border:1px solid var(--border);border-radius:var(--r2);padding:9px 5px;text-align:center;cursor:pointer;transition:all .2s;font-size:11px;color:var(--txt2)}
.co.on{border-color:var(--p);background:rgba(124,58,237,.15);color:#A78BFA}
.ce{font-size:18px;display:block;margin-bottom:3px}
/* COLORS */
.color-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:10px}
.csw{height:46px;border-radius:12px;cursor:pointer;transition:all .2s;border:2.5px solid transparent;display:flex;align-items:center;justify-content:center;position:relative}
.csw.on{border-color:rgba(255,255,255,.9);transform:scale(1.07);box-shadow:0 2px 14px rgba(255,255,255,.22)}
.chk{font-size:15px;color:#fff;opacity:0;font-weight:700;text-shadow:0 1px 4px rgba(0,0,0,.7)}
.csw.on .chk{opacity:1}
/* CARD PREVIEW */
.card-prev{border-radius:12px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;transition:background .3s;margin-bottom:4px;min-height:54px}
/* PICKER TOGGLE */
.picker-item{display:flex;justify-content:space-between;align-items:center;padding:13px 14px;background:var(--surf2);border-radius:var(--r2);margin-bottom:8px;cursor:pointer;border:1.5px solid transparent;transition:all .2s}
.picker-item.on{border-color:var(--p);background:rgba(124,58,237,.12)}
.tgl{width:42px;height:24px;border-radius:12px;background:var(--surf3);position:relative;transition:background .25s;flex-shrink:0}
.tgl.on{background:var(--p)}
.tgl::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .25s;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.tgl.on::after{left:21px}
.cycle-sum{text-align:center;padding:16px;background:linear-gradient(135deg,rgba(124,58,237,.15),rgba(59,130,246,.15));border-radius:14px;border:1px solid rgba(124,58,237,.25);margin-bottom:10px}
.cycle-sum-lbl{font-size:10px;color:#A78BFA;text-transform:uppercase;letter-spacing:.5px;font-weight:700;margin-bottom:5px}
.cycle-sum-val{font-size:28px;font-weight:800;background:linear-gradient(135deg,#A78BFA,#60A5FA);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.del-confirm{display:none;background:rgba(239,68,68,.1);border:1px solid var(--red);border-radius:var(--r2);padding:14px;text-align:center;margin-top:10px}
#toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:10px 22px;border-radius:30px;font-size:13px;font-weight:600;z-index:3000;opacity:0;transition:opacity .3s;pointer-events:none}
.ch{position:relative;height:200px;width:100%}
.chl{position:relative;height:230px;width:100%}
.empty{text-align:center;padding:36px 16px;color:var(--muted);font-size:13px}
.empty-i{font-size:40px;margin-bottom:10px}
.lg-item{display:flex;align-items:center;gap:9px;padding:5px 0}
.lg-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.stitle{font-size:21px;font-weight:800;letter-spacing:-.5px;margin-bottom:14px}
#cycle-row{display:flex;gap:8px;margin-bottom:13px;overflow-x:auto;scrollbar-width:none}
#cycle-row::-webkit-scrollbar{display:none}
.search-bar{position:relative;margin-bottom:12px}
.search-bar .fi{padding-left:34px}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none}
.parcela-badge{display:inline-block;background:rgba(59,130,246,.2);color:#60A5FA;border-radius:20px;padding:1px 7px;font-size:10px;font-weight:600;margin-left:3px}
</style>
</head>
<body>
<div id="scrim" onclick="toggleMenu()"></div>
<div id="sidebar">
  <div class="profile-section">
    <div class="profile-img-container">
      <img id="side-profile-img" src="" style="display:none">
      <i class="fa-solid fa-user" id="side-profile-icon"></i>
      <label class="edit-photo-btn" for="photo-upload"><i class="fa-solid fa-camera"></i></label>
      <input type="file" id="photo-upload" hidden accept="image/*" onchange="uploadPhoto(event)">
    </div>
    <h2 id="side-name" style="font-size:18px;font-weight:700">Você</h2>
    <p id="cloud-status" style="font-size:11px;color:var(--green);margin-top:4px">☁️ Sincronizado na nuvem</p>
  </div>
  <div style="flex:1">
    <label style="font-size:11px;color:var(--muted);text-transform:uppercase;font-weight:700">Seu Perfil</label>
    <div style="margin-top:15px">
      <p style="font-size:12px;margin-bottom:5px;color:var(--txt2)">Como quer ser chamado?</p>
      <input class="fi" id="edit-name" placeholder="Seu Nome" onchange="updateProfileData()" style="margin-bottom:20px">
      <p style="font-size:12px;margin-bottom:5px;color:var(--txt2)">Renda Mensal (R$)</p>
      <input class="fi" id="edit-income" type="number" placeholder="0,00" onchange="updateProfileData()">
    </div>
  </div>
</div>

<div id="hdr">
  <div class="hdr-top">
    <div class="greeting"><i class="fa-solid fa-bars menu-trigger" onclick="toggleMenu()"></i>Olá, <span id="hdr-user-name" style="margin-left:6px">você</span> 👋</div>
    <div class="month-tag"><span class="m-arr" onclick="shiftMonth(-1)">&lt;</span><span id="hdr-month" style="min-width:65px;text-align:center">Mai 2026</span><span class="m-arr" onclick="shiftMonth(1)">&gt;</span></div>
  </div>
  <div id="chips"></div>
</div>

<div id="screens">
  <section class="scr on" id="s-dashboard">
    <div id="insights-row" style="display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:10px;scrollbar-width:none"></div>
    <div class="big-stat">
      <div class="bs-lbl">💳 POSSO GASTAR<span class="bs-cfg" onclick="openPicker('spend')"><i class="fa-solid fa-sliders" style="font-size:10px"></i> Cartões</span></div>
      <div class="bs-val" id="bs-val">R$ 0</div>
      <div class="bs-sub" id="bs-sub">Limite disponível consolidado</div>
    </div>
    <div class="sg">
      <div class="sc sc-tap" onclick="openDetails('cycle','current')"><div class="sl">Fatura Atual</div><div class="sv" style="color:var(--red)" id="d-curr">R$ 0</div><div class="ss" id="lbl-d-curr">Maio 2026</div><span class="sc-link">Ver lançamentos →</span></div>
      <div class="sc sc-tap" onclick="openDetails('cycle','next')"><div class="sl">Próxima Fatura</div><div class="sv" style="color:var(--amber)" id="d-next">R$ 0</div><div class="ss" id="lbl-d-next">Junho 2026</div><span class="sc-link">Ver lançamentos →</span></div>
      <div class="sc"><div class="sl">Limite Total</div><div class="sv" id="d-limit">R$ 0</div><div class="ss" id="d-cards">0 cartões</div></div>
      <div class="sc"><div class="sl">Lançamentos
